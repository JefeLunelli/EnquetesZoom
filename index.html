<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Enquete</title>
    <link rel="stylesheet" href="styles/styles.css">
    <meta name="theme-color" content="#a9a9a9">
    <link rel="icon" type="image/png" href="img/planilhas-do-google.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/vfs_fonts.js"></script>
</head>

<body>
    <div id="dateContainer"></div>

    <div class="botao-inicial-container">
        <button class="botao-inicial button" onclick="window.open('https://jworg.zoom.us/account/report/export/livepoll?meetingNumber=2674548583')">
            Baixar Enquete
        </button>
        
        <div class="imagens-container">
            <img src="img/download-file.png" alt="baixar-enquete" class="imagem-enquete">
            <img src="img/search-file.png" alt="escolher-arquivo" class="imagem-arquivo">
        </div>

        <input type="file" id="fileInput" style="display: none;">
        <button class="botao-inicial button" id="customFileInput">Escolher arquivo</button>
        <button id="uploadButton" style="display: none;">Enviar</button>
    </div>

    <div class="table-container">
        <table id="tabela-participantes"></table>
    </div>

    <div id="controles-pos-tabela" style="text-align: center; margin-top: 20px;">
        <button id="pdfButton" class="button">Gerar PDF</button>
    </div>

    <script src="scripts/main.js"></script>
</body>
</html>
